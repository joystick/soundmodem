<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoundModem Chat</title>
  <link rel="icon" href="data:,">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <style>
    #chat {
      height: 360px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.875rem;
    }
    #chat .chat-line { padding: 2px 4px; border-radius: 3px; }
    #chat .tx   { color: #4ade80; }
    #chat .rx   { color: #60a5fa; }
    #chat .err  { color: #f87171; }
    #chat .file { color: #c084fc; }
  </style>
</head>
<body>
  <div class="container py-4" style="max-width: 720px;">

    <!-- Header -->
    <div class="d-flex align-items-center gap-2 mb-3">
      <h4 class="mb-0 fw-semibold">📡 SoundModem P2P Chat</h4>
    </div>

    <!-- Config card -->
    <div class="card mb-3">
      <div class="card-body pb-2">
        <div class="row g-2">
          <div class="col-sm-3">
            <label class="form-label small text-secondary mb-1">Callsign</label>
            <input id="callsign" data-testid="callsign-input"
              class="form-control form-control-sm font-monospace text-uppercase"
              placeholder="TEST01" maxlength="6" autocomplete="off"
              oninput="localStorage.setItem('callsign', this.value)">
          </div>
          <div class="col-sm-4">
            <label class="form-label small text-secondary mb-1">Passphrase <span class="text-muted">(optional)</span></label>
            <input id="passphrase" data-testid="passphrase-input"
              class="form-control form-control-sm"
              type="password" placeholder="shared secret"
              oninput="this.value ? localStorage.setItem('passphrase', this.value) : localStorage.removeItem('passphrase')">
          </div>
          <div class="col-sm-5">
            <label class="form-label small text-secondary mb-1">Microphone</label>
            <select id="micSelect" data-testid="mic-select"
              class="form-select form-select-sm">
              <option value="">Default</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Controls row -->
    <div class="d-flex align-items-center gap-2 mb-3">
      <button id="toggleBtn" data-testid="toggle-btn"
        class="btn btn-sm btn-outline-success"
        onclick="toggleAudio()">
        ▶ Start Audio
      </button>
      <select id="modemMode" data-testid="modem-mode-select"
        class="form-select form-select-sm"
        style="width:auto"
        onchange="setModemMode(this.value)">
        <option value="bell202">Bell 202</option>
        <option value="ofdm">OFDM-HF</option>
      </select>
      <span class="d-flex align-items-center gap-2 ms-1">
        <span id="status" data-testid="status"
          class="badge rounded-pill bg-warning text-dark">Stopped</span>
        <span id="demod-mode" data-testid="demod-mode"
          class="badge rounded-pill bg-secondary text-light" style="font-size:0.7rem;"></span>
        <span id="ofdm-snr" data-testid="ofdm-snr"
          class="d-none badge rounded-pill bg-info text-dark" style="font-size:0.7rem;"></span>
        <span id="ofdm-phase-err" data-testid="ofdm-phase-err"
          class="d-none badge rounded-pill bg-secondary text-light" style="font-size:0.7rem;"></span>
      </span>
    </div>

    <!-- Chat log -->
    <div class="card mb-2">
      <div class="card-body p-2">
        <div id="chat" data-testid="chat-log" class="p-1"></div>
      </div>
    </div>

    <!-- Message input -->
    <div class="input-group">
      <input id="message" data-testid="message-input"
        class="form-control font-monospace"
        placeholder="Type message and press Enter…"
        onkeypress="if(event.key==='Enter') sendMsg()">
      <button class="btn btn-primary" data-testid="send-btn"
        onclick="sendMsg()">Send</button>
      <button class="btn btn-outline-secondary" data-testid="send-file-btn"
        onclick="document.getElementById('fileInput').click()">📎 File</button>
      <input type="file" id="fileInput" data-testid="file-input"
        style="display:none" onchange="sendFile()">
    </div>

  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <!-- BUNDLE -->
</body>
</html>
